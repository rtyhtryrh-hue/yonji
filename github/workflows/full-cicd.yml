name: Full CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== SECURITY & QUALITY ==========
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
  
      - name: Install dependencies
        run: npm ci
  
      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true
  
      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
  
      - name: Install dependencies
        run: npm ci
  
      - name: Run ESLint
        run: npm run lint

  # ========== TESTS ==========
  test:
    runs-on: ubuntu-latest
    needs: [security-scan, lint]
  
    strategy:
      matrix:
        node-version: [16, 18, 20]
      fail-fast: false
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
  
      - name: Install dependencies
        run: npm ci
  
      - name: Run tests
        run: npm test
        env:
          CI: true
  
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 18
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # ========== BUILD ==========
  build:
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      version: ${{ steps.version.outputs.version }}
  
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
  
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
  
      - name: Install dependencies
        run: npm ci
  
      - name: Build application
        run: npm run build
  
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            src/
            package.json
            package-lock.json
          retention-days: 7
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name != 'pull_request'
  
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
  
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== DEPLOY TO STAGING ==========
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
  
    steps:
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}"
          # Здесь будет команда деплоя (kubectl, docker-compose, и т.д.)
          echo "✅ Staging deployment completed!"
  
      - name: Health check
        run: |
          echo "🏥 Running health checks..."
          # curl -f https://staging.your-app.com/health || exit 1
          echo "✅ Health checks passed!"

  # ========== DEPLOY TO PRODUCTION ==========
  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-staging, build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
  
    steps:
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}"
          echo "✅ Production deployment completed!"
  
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  # ========== NOTIFICATIONS ==========
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
  
    steps:
      - name: Send notification
        run: |
          echo "📧 Sending notification..."
          echo "Status: ${{ needs.deploy-production.result }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"